name: CI

on:
  push:
    branches:
      - main
      - h-charafi-UBOOK
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
        env:
          VITE_API_BASE_URL: http://localhost:8080/api
          VITE_REQUIRE_AUTH: "true"
          VITE_AUTH_SESSION_STORAGE: local

  backend:
    name: Backend check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    env:
      UBOOK_ENVIRONMENT: test
      UBOOK_DATABASE_URL: sqlite:///./test.db
      UBOOK_SECRET_KEY: test-secret-key
      UBOOK_REFRESH_SECRET_KEY: test-refresh-secret
      UBOOK_FIELD_ENCRYPTION_KEY: test-field-key
      UBOOK_STORAGE_PROVIDER: local
      UBOOK_AUTO_CREATE_TABLES: "true"
      UBOOK_AUTO_SEED: "false"

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check Python syntax
        run: python -m compileall -q app alembic tests

      - name: Run tests
        run: pytest -q

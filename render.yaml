services:
  - type: web
    name: ubook-back
    runtime: docker
    rootDir: backend
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: UBOOK_ENVIRONMENT
        value: production

      - key: UBOOK_DATABASE_URL
        fromDatabase:
          name: ubook-db
          property: connectionString

      - key: UBOOK_REDIS_URL
        fromService:
          type: keyvalue
          name: ubook-redis
          property: connectionString

      - key: UBOOK_SECRET_KEY
        generateValue: true

      - key: UBOOK_REFRESH_SECRET_KEY
        generateValue: true

      - key: UBOOK_REFRESH_TOKEN_DAYS
        value: 7

      - key: UBOOK_FIELD_ENCRYPTION_KEY
        generateValue: true

      - key: UBOOK_FRONTEND_URL
        value: https://ubook-f.onrender.com

      - key: UBOOK_CORS_ORIGINS
        value: https://ubook-f.onrender.com,https://ubook-front.onrender.com

      - key: UBOOK_SECURE_COOKIES
        value: true

      - key: UBOOK_AUTH_COOKIE_SAMESITE
        value: none

      - key: UBOOK_AUTH_COOKIE_DOMAIN
        value: ""

      - key: UBOOK_AUTO_CREATE_TABLES
        value: false

      - key: UBOOK_AUTO_SEED
        value: false

      - key: UBOOK_STORAGE_PROVIDER
        value: cloudinary

      - key: UBOOK_LOCAL_UPLOAD_DIR
        value: uploads

      - key: UBOOK_CLOUDINARY_URL
        sync: false

      - key: UBOOK_GOOGLE_CLIENT_ID
        sync: false

      - key: UBOOK_GOOGLE_CLIENT_SECRET
        sync: false

      - key: UBOOK_GOOGLE_REDIRECT_URI
        value: https://ubook-back.onrender.com/api/auth/oauth/google/callback

      - key: UBOOK_OAUTH_JAVASCRIPT_ORIGINS
        value: https://ubook-f.onrender.com,https://ubook-front.onrender.com

      - key: UBOOK_MICROSOFT_CLIENT_ID
        sync: false

      - key: UBOOK_MICROSOFT_CLIENT_SECRET
        sync: false

      - key: UBOOK_MICROSOFT_REDIRECT_URI
        value: https://ubook-back.onrender.com/api/auth/oauth/microsoft/callback

  - type: web
    name: ubook-front
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    autoDeploy: true
    envVars:
      - key: VITE_API_BASE_URL
        value: https://ubook-back.onrender.com/api

      - key: VITE_REQUIRE_AUTH
        value: true

      - key: VITE_AUTH_SESSION_STORAGE
        value: local

      - key: NODE_VERSION
        value: 20.19.0

    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: keyvalue
    name: ubook-redis
    plan: free
    ipAllowList:
      - source: 0.0.0.0/0
        description: everywhere

databases:
  - name: ubook-db
    databaseName: ubook
    user: ubook
    plan: free
